<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VertiCut — 9:16 Overlay Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><div class="logo-icon"></div>Verti<span>Cut</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="badge">9:16 OVERLAY EDITOR</div>
      <span class="file-info" id="file-info-label"></span>
    </div>
  </header>

  <div class="workspace">
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">▶</div>
      <div class="drop-text"><strong>Drop gameplay video here</strong>or click to browse</div>
      <div class="drop-text" style="font-size:.72rem;margin-top:4px">MP4 · MOV · AVI · MKV</div>
      <input type="file" id="file-input" accept="video/*,.mkv">
    </div>

    <div id="editor-area">
      <div class="editor-toolbar">
        <span class="tool-label">MODE</span>
        <button class="btn active" id="btn-draw" onclick="setMode('draw')">✚ Crop Zone</button>
        <div class="draw-badge" id="draw-badge"><div class="draw-dot"></div>Draw on video</div>
        <div style="flex:1"></div>
        <button class="btn btn-danger" onclick="resetToStart()">&#8592; New Video</button>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="canvas-container" id="canvas-container">
          <canvas id="video-canvas"></canvas>
          <canvas id="zone-overlay"></canvas>
          <div id="draw-guide"></div>
        </div>
      </div>
      <div class="timeline-bar">
        <button class="play-btn" id="play-btn" onclick="togglePlay()" title="Play / Pause (Space)">▶</button>
        <span class="time-label" id="time-current">0:00</span>
        <div class="tl-wrap">
          <div class="tl-track" id="tl-track">
            <div class="tl-mask tl-mask-l" id="tl-mask-l"></div>
            <div class="tl-active" id="tl-active"></div>
            <div class="tl-mask tl-mask-r" id="tl-mask-r"></div>
            <div class="tl-handle tl-h-in" id="tl-h-in" title="Trim start — drag to set in-point"></div>
            <div class="tl-handle tl-h-out" id="tl-h-out" title="Trim end — drag to set out-point"></div>
            <div class="tl-head" id="tl-head"></div>
          </div>
          <div class="tl-info">
            <span class="tl-time" id="tl-in-lbl">0:00</span>
            <span class="tl-clip-dur" id="tl-clip-dur"></span>
            <span class="tl-time" id="tl-out-lbl">0:00</span>
          </div>
        </div>
        <span class="time-label" id="time-total">0:00</span>
      </div>
      <div class="audio-tracks-bar hidden" id="audio-tracks-bar"></div>
    </div>

    <div class="resize-handle" id="rh1"></div>

    <div class="output-panel">
      <div class="output-header">
        <div class="section-title" style="flex:1">Output · 9:16</div>
        <button class="outline-toggle" id="outline-toggle-btn" onclick="toggleOutlines()">⬡ outlines</button>
      </div>
      <div class="output-canvas-wrap"><canvas id="output-canvas"></canvas></div>
      <div class="out-res-row">
        <span class="out-res-label">RES</span>
        <input type="number" class="out-res-input" id="out-w" value="1080" min="1" max="7680">
        <span class="out-res-sep">×</span>
        <input type="number" class="out-res-input" id="out-h" value="1920" min="1" max="7680">
        <div class="out-res-divider"></div>
        <span class="out-res-label">FPS</span>
        <input type="number" class="out-res-input" id="out-fps" value="60" min="1" max="240" style="width:44px">
      </div>
      <div class="export-section">
        <button class="export-btn" id="export-btn" onclick="exportVideo()">Export 9:16 Video</button>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-fill"></div></div>
          <div class="progress-stats">
            <span class="progress-pct" id="progress-pct">0%</span>
            <span class="progress-detail" id="progress-detail">Starting…</span>
          </div>
          <div class="progress-time-row">
            <span id="progress-timecode"></span>
            <span class="progress-speed" id="progress-speed"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="resize-handle" id="rh2"></div>

    <div class="zones-panel">
      <div class="panel-header"><div class="section-title">Zones</div></div>
      <div class="zones-scroll" id="zones-list">
        <div style="font-size:.72rem;font-family:var(--font-mono);color:var(--text-dim);line-height:1.9;padding:4px">
          Load a video then draw crop zones.<br><br>Drag zones on either canvas to reposition.
        </div>
      </div>
      <button class="add-zone-btn" onclick="startDrawZone()">✚ Draw new crop zone</button>
      <div class="presets-section">
        <div class="panel-header"><div class="section-title">Presets</div></div>
        <div class="presets-scroll" id="presets-list"></div>
        <button class="save-preset-btn" onclick="openSavePreset()">★ Save layout as preset</button>
      </div>
    </div>
  </div>
</div>

<div id="preset-modal">
  <div class="modal-box">
    <div class="modal-title">Save Preset</div>
    <input type="text" class="modal-input" id="preset-name-input" placeholder="e.g. FPS Layout, Cam + Gameplay…" maxlength="40">
    <div class="modal-actions">
      <button class="modal-btn" onclick="closePresetModal()">Cancel</button>
      <button class="modal-btn confirm" onclick="confirmSavePreset()">Save</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<!-- Scripts loaded in dependency order -->
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/geometry.js"></script>
<script src="js/audio.js"></script>
<script src="js/timeline.js"></script>
<script src="js/canvas.js"></script>
<script src="js/zones.js"></script>
<script src="js/presets.js"></script>
<script src="js/export.js"></script>
<script src="js/interaction.js"></script>
<script src="js/app.js"></script>
</body>
</html>
